
version: '3.8'

services:
  frontend:
    image: bloqmey/frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - public-network
    restart: always

  backend:
    image: bloqmey/backend:latest
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_HOST=db
      - DB_USER=leakcheck
      - DB_PASSWORD=secure_password
      - DB_NAME=leakcheck_db
      - JWT_SECRET=super_secret_jwt_key
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - public-network
      - app-network
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=leakcheck
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=leakcheck_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leakcheck"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

networks:
  app-network:
    driver: bridge
  public-network:
    driver: bridge

volumes:
  pgdata:
